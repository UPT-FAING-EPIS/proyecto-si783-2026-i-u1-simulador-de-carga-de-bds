name: Database Load Performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

  performance:
    name: Performance threshold check (${{ matrix.engine }}, ${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        engine:
          - sqlserver
          - mysql
          - postgresql
          - oracle
          - sqlite
          - mongodb
          - redis
        scenario:
          - light
          - medium
          - heavy

    env:
      PERF_ENGINE: ${{ matrix.engine }}
      PERF_SCENARIO: ${{ matrix.scenario }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run database load simulation
        run: node scripts/performance-test.mjs

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.engine }}-${{ matrix.scenario }}-report
          path: reports/

  summary:
    name: Consolidated performance summary
    runs-on: ubuntu-latest
    needs: performance
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download performance reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report'
          path: reports/engines

      - name: Generate consolidated summary
        run: node scripts/performance-summary.mjs reports/engines

      - name: Comment summary on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const marker = '<!-- database-load-performance-summary -->'
            const summary = fs.readFileSync('reports/performance-summary.md', 'utf8')
            const body = `${marker}\n${summary}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.data.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-summary
          path: reports/performance-summary.*
